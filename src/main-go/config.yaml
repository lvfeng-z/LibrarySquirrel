# LibrarySquirrel Go 服务配置

server:
  port: 8080
  mode: debug

database:
  path: E:/code/lvfeng/LibrarySquirrel/database/database.db

log:
  level: info
  format: console

app:
  host: 127.0.0.1
  resourcePath: ./resources
  dataPath: ./data

# 站点配置（来自旧代码 iniConfig.yml）
sites:
  - name: local
    description: 此电脑
  - name: pixiv
    description: |
      pixiv是喜欢插画、对插画感兴趣的朋友们的交流平台。在这里，您可以投稿自己的插画作品，并与其他用户轻松展开交流。
      注册・使用免费。
  - name: exhentai
    description: With more than a million absolutely free hentai doujinshi, manga, cosplay and CG galleries, E-Hentai Galleries is the world's largest free Hentai
  - name: deviantart
    description: |
      We are where art starts, but that's only the beginning. We are the movement for the liberation of creative expression.
      Founded in August 2000, DeviantArt is the largest online social network for artists and art enthusiasts.

# 插件配置（来自旧代码 iniConfig.yml）
plugins:
  - packagePath: initialization/pixivSuite.zip
    pathType: Relative
